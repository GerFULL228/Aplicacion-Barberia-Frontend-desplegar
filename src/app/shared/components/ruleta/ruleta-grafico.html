<div class="ruleta-wrap rounded-xl">
    <div class="controles-audio" *ngIf="interactiva">
        <button pButton type="button" class="p-button-rounded p-button-text" [icon]="iconoVolumen" (click)="toggleMusica()"></button>
        <p-slider [(ngModel)]="volumen" [min]="0" [max]="100" (onChange)="cambiarVolumen($event.value)" styleClass="slider-volumen"></p-slider>
    </div>
    <div class="marquesina" [class.marquesina--girando]="girando()">
        <div class="puntero" aria-hidden="true">
            <svg viewBox="0 0 40 58" width="40" height="58">
                <path d="M20 52 C10 38 2 28 2 16 A18 18 0 0 1 38 16 C38 28 30 38 20 52 Z" fill="url(#gradPuntero)"stroke="#3a2a10" stroke-width="1.5" />
                <circle cx="20" cy="17" r="7" fill="#151312" />
                <defs>
                    <linearGradient id="gradPuntero" x1="0" y1="0" x2="0" y2="1">
                        <stop offset="0%" stop-color="#f4dd9a" />
                        <stop offset="100%" stop-color="#c8952f" />
                    </linearGradient>
                </defs>
            </svg>
        </div>

        <div class="anillo-luces" aria-hidden="true">
            <span class="bulbo" *ngFor="let b of [].constructor(24); let i = index" [style.transform]="'rotate(' + (i * 15) + 'deg) translateY(-158px)'" [style.animation-delay.ms]="(i % 2 === 0 ? 0 : 260)"></span>
        </div>
        
        <div class="disco" [style.transform]="'rotate(' + rotacionActual() + 'deg)'">
            <svg class="disco-svg" viewBox="0 0 300 300">
                <g *ngFor="let p of premios; let i = index">
                    <path [attr.d]="sectorPath(i)" [attr.fill]="p.color || (i % 2 === 0 ? '#f4efe1' : '#171412')"></path>
                </g>
                <circle cx="150" cy="150" r="149" fill="none" stroke="#caa24a" stroke-width="2" opacity="0.5" />
            </svg>
        
            <div class="etiqueta" *ngFor="let p of premios; let i = index" [style.transform]="'rotate(' + anguloCentroSegmento(i) + 'deg)'">
                <div class="etiqueta__contenido" [style.transform]="'translateY(-72px) rotate(-' + anguloCentroSegmento(i) + 'deg)'" [class.etiqueta__contenido--claro]="p.color ? false : i % 2 === 0" [class.etiqueta__contenido--oscuro]="p.color ? false : i % 2 !== 0" [style.color]="p.color ? obtenerColorTexto(p.color) : null">
                    <span class="icono" [ngSwitch]="p.icono">
                        <svg *ngSwitchCase="'tijera'" viewBox="0 0 24 24" width="22" height="22">
                            <circle cx="6" cy="6" r="2.4" fill="none" stroke="currentColor" stroke-width="1.6" />
                            <circle cx="6" cy="18" r="2.4" fill="none" stroke="currentColor" stroke-width="1.6" />
                            <path d="M8 7.5L20 17M8 16.5L20 7" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round" />
                        </svg>
                        <svg *ngSwitchCase="'frasco'" viewBox="0 0 24 24" width="20" height="20">
                            <rect x="9" y="2.5" width="6" height="3" rx="0.5" fill="currentColor" />
                            <path d="M8 6.5h8l1 3v11a1.5 1.5 0 0 1-1.5 1.5h-7A1.5 1.5 0 0 1 7 20.5V9.5z" fill="none" stroke="currentColor" stroke-width="1.6" />
                            <line x1="7.6" y1="12.5" x2="16.4" y2="12.5" stroke="currentColor" stroke-width="1.2" />
                        </svg>
                        <svg *ngSwitchCase="'bigote'" viewBox="0 0 24 24" width="24" height="24">
                            <path d="M2 14c2-4 5-5 6.5-3 1-2 2.5-2 3.5-1 1-1 2.5-1 3.5 1C17 9 20 10 22 14 c-2.5-1.5-4.5-1-6-0.2C14.7 15 13.5 15.4 12 13.6c-1.5 1.8-2.7 1.4-3.9 0.2 C6.5 13 4.5 12.5 2 14z" fill="currentColor" />
                        </svg>
                        <svg *ngSwitchCase="'porcentaje'" viewBox="0 0 24 24" width="20" height="20">
                            <circle cx="7" cy="7" r="3" fill="none" stroke="currentColor" stroke-width="1.6" />
                            <circle cx="17" cy="17" r="3" fill="none" stroke="currentColor" stroke-width="1.6" />
                            <line x1="6" y1="18" x2="18" y2="6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
                        </svg>
                        <svg *ngSwitchCase="'estrella'" viewBox="0 0 24 24" width="20" height="20">
                            <path d="M12 2.5l2.9 6.1 6.6.8-4.9 4.6 1.3 6.6L12 17.6l-5.9 3 1.3-6.6-4.9-4.6 6.6-.8z" fill="currentColor" />
                        </svg>
                        <svg *ngSwitchCase="'dado'" viewBox="0 0 24 24" width="20" height="20">
                            <rect x="3" y="3" width="18" height="18" rx="3" fill="none" stroke="currentColor" stroke-width="1.6" />
                            <circle cx="8" cy="8" r="1.3" fill="currentColor" />
                            <circle cx="16" cy="8" r="1.3" fill="currentColor" />
                            <circle cx="8" cy="16" r="1.3" fill="currentColor" />
                            <circle cx="16" cy="16" r="1.3" fill="currentColor" />
                            <circle cx="12" cy="12" r="1.3" fill="currentColor" />
                        </svg>
                    </span>
                    <span class="iconos"><i class="pi" [ngClass]="obtenerIcono(p.tipoPremio)"></i></span>
                    <span class="etiqueta__texto">{{ p.label }} <small *ngIf="p.sublabel">{{ p.sublabel }}</small></span>
                </div>
            </div>
            <div class="disco-centro">
                <span>GIRA</span>
            </div>
        </div>
    </div>
    <button pButton class="boton-primary" (click)="girar()" [disabled]="girando() || !interactiva" *ngIf="interactiva">
        <i class="pi pi-spin pi-sync" *ngIf="girando()"></i> {{ girando() ? 'Girando…' : textoBoton }}
    </button>
    <p class="etiqueta-solo-vista" *ngIf="!interactiva">Vista previa (no interactiva)</p>

    <div class="resultado-overlay" *ngIf="mostrarResultado()" (click)="cerrarResultado()">
        <div class="resultado-card" (click)="$event.stopPropagation()">
            <p class="resultado-eyebrow">¡Felicidades!</p>
            <h3 class="resultado-titulo">{{ premioGanador()?.label }}</h3>
            <p class="resultado-sub" *ngIf="premioGanador()?.sublabel">{{ premioGanador()?.sublabel }}</p>
            <button class="boton-cerrar" (click)="cerrarResultado()">Aceptar</button>
        </div>
    </div>
    
    <div class="resultado-overlay" *ngIf="mostrarResultado()" (click)="cerrarResultado()">
        <div class="resultado-card" (click)="$event.stopPropagation()">
            <div class="resultado-header">
                <span class="resultado-badge"><i class="pi pi-sparkles"></i>¡Felicidades!</span>
            </div>
            <div class="resultado-media">
                <div class="resultado-imagen" *ngIf="premioGanador()?.imagen">
                <img [src]="premioGanador()?.imagen | safeImageUrl" [alt]="premioGanador()?.label">
            </div>
            <div class="resultado-icono" *ngIf="!premioGanador()?.imagen">
                <i class="pi" [ngClass]="obtenerIcono(premioGanador()?.tipoPremio)"></i>
            </div>
        </div>
        <h2 class="resultado-titulo">{{ premioGanador()?.label }}</h2>
        <p class="resultado-sub" *ngIf="premioGanador()?.descripcion">{{ premioGanador()?.descripcion }}</p>
        <div class="resultado-info">
            <div class="resultado-chip">
                <i class="pi icono" [ngClass]="obtenerIcono(premioGanador()?.tipoPremio)"></i>{{ premioGanador()?.tipoPremio }}
            </div>
        </div>
        <button pButton class="boton-primary" (click)="cerrarResultado()">Reclamar premio</button>
    </div>
</div>
