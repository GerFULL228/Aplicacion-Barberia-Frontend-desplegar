<div class="flex flex-col gap-3">
    <app-search-bar [(value)]="textoBusqueda" placeholder="Buscar producto" (search)="buscar($event)"/>
    <p-table [value]="productos" [lazy]="true" (onLazyLoad)="onLazyLoad($event)" [rows]="rows" [paginator]="true"[loading]="loading" [totalRecords]="totalRecords">
        <ng-template pTemplate="header">
            <tr>
                <th>Imagen</th>
                <th>Nombre</th>
                <th>Precio</th>
                <th>Stock</th>
                <th>Categoría</th>
                <th></th>
            </tr>
        </ng-template>
        <ng-template pTemplate="body" let-producto>
            <tr>
                <td width="70">
                    @if(producto.urlsMultimedia?.length){
                        <p-image [src]="producto.urlsMultimedia[0] | safeImageUrl" class="w-12 h-12 rounded object-cover" preview="true"></p-image>
                    }
                    @else{
                        <div class="w-12 h-12 rounded bg-gray-200 flex items-center justify-center">
                            <i class="pi pi-image text-gray-500"></i>
                        </div>
                    }
                </td>
                <td><div class="font-semibold">{{producto.nombre}}</div></td>
                <td>{{producto.precio | soles}}</td>
                <td>{{producto.stock}}</td>
                <td>{{producto.nombreCategoria}}</td>
                <td width="90"><p-button icon="pi pi-check" class="boton-agregar" (click)="seleccionarProducto(producto)"></p-button></td>
            </tr>
        </ng-template>
    </p-table>
</div>
