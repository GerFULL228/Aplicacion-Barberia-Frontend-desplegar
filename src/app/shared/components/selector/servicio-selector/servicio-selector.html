<div class="flex flex-col gap-3">
    <app-search-bar [(value)]="textoBusqueda" placeholder="Buscar servicio" (search)="buscar($event)"/>
    <p-table [value]="servicios" [lazy]="true" [loading]="loading" [rows]="rows" [paginator]="true" [totalRecords]="totalRecords" (onLazyLoad)="onLazyLoad($event)">
        <ng-template pTemplate="header">
            <tr>
                <th>Imagen</th>
                <th>Nombre</th>
                <th>Categoría</th>
                <th>Duración</th>
                <th>Precio</th>
                <th width="80"></th>
            </tr>
        </ng-template>
        <ng-template pTemplate="body" let-servicio>
            <tr>
                <td width="70">
                    @if(servicio.urlsMultimedia?.length){
                        <p-image [src]="servicio.urlsMultimedia[0] | safeImageUrl" class="w-12 h-12 rounded object-cover" preview="true"></p-image>
                    }
                    @else{
                        <div class="w-12 h-12 rounded bg-gray-200 flex items-center justify-center">
                            <i class="pi pi-image text-gray-500"></i>
                        </div>
                    }
                </td>
                <td><div class="font-semibold">{{ servicio.nombre }}</div></td>
                <td>{{ servicio.categoriaNombre }}</td>
                <td>{{ servicio.duracion }} min</td>
                <td>{{ servicio.precio | soles}}</td>
                <td class="text-center"><p-button icon="pi pi-check" class="boton-agregar" (click)="seleccionarServicio(servicio)"></p-button></td>
            </tr>
        </ng-template>
    </p-table>
</div>
