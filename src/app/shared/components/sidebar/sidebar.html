@let items = menu$ | async;

<aside class="sidebar-shell w-full h-full min-h-0 overflow-hidden p-4 flex flex-col items-stretch text-brand-gold transition-all duration-300" [class.sidebar-collapsed]="collapsed">
    <header class="sidebar-brand relative px-4 py-6 border-b border-ui-border">
        <a href="/inicio" class="group block rounded-2xl p-3 transition-all duration-300 hover:bg-brand-gold-soft hover:shadow-[0_0_25px_rgba(212,175,55,0.18)]">
            @if (!collapsed) {
            <div class="flex flex-col items-start text-left gap-2">
                <div class="brand-mark transition-all duration-300 group-hover:text-brand-gold  group-hover:scale-110  group-hover:rotate-3">
                    <i class="pi pi-crown"></i>
                </div>

                <div>
                    <h1 class="text-[1.7rem] leading-none font-semibold tracking-[0.18em] transition-all duration-300 group-hover:text-brand-gold group-hover:scale-110 group-hover:translate-x-1">FadeX</h1>
                    <p class="mt-1 text-[0.72rem] uppercase tracking-[0.25em] text-text-muted transition-all duration-300 group-hover:text-brand-white">Sistema de Gestión <br>de Barbería</p>
                </div>
            </div>
            } @else {

            <div class="sidebar-compact-brand flex flex-col items-center justify-center text-center gap-0 py-2 transition-all duration-300 group-hover:scale-105">
                <div class="brand-mark brand-mark-compact transition-all duration-300 group-hover:text-brand-gold group-hover:rotate-6">
                    <i class="pi pi-crown"></i>
                </div>
                <span class="sidebar-initial transition-all duration-300 group-hover:text-brand-gold"> F</span>
            </div>
            }
        </a>
    </header>

    <div class="sidebar-menu flex-1 min-h-0 overflow-y-auto p-4">
        @if (items) {
        <p-panelMenu [model]="items" class="custom-panelmenu w-full"></p-panelMenu>
        }
    </div>

    <div class="sidebar-footer border-t border-ui-border p-4">
        <button type="button" class="boton-logout w-full" (click)="logout()">
            <span class="flex items-center gap-3">
                <i class="pi pi-sign-out text-brand-red"></i>
                <span>Cerrar sesión</span>
            </span>
        </button>
    </div>
</aside>
