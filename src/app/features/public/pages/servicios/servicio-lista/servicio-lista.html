<section class="bg-black py-10 px-2">
    <div class="text-center mb-10">
        <h2 class="text-white text-3xl font-bold uppercase tracking-wide">¿Qué hacemos por ti?</h2>
        <div class="mt-3 w-16 h-1 bg-yellow-500 mx-auto rounded-full"></div>
    </div>

    @if (cargando) {
    <div class="flex justify-center py-20">
        <div class="w-12 h-12 border-4 border-yellow-500 border-t-transparent rounded-full animate-spin"></div>
    </div>
    } @else if (servicios.length === 0) {
    <div class="text-center py-20">
        <h3 class="text-white text-xl font-semibold">No hay servicios disponibles</h3>
        <p class="text-gray-400 mt-2">Vuelve más tarde.</p>
    </div>
    } @else {
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
        @for (servicio of servicios; track trackById($index, servicio)) {
            <app-servicio-card [servicio]="servicio" (seleccionado)="seleccionado.emit($event)" />
        }
    </div>
    }
</section>
