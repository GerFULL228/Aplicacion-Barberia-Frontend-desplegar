<div (click)="onSeleccionar()" class="relative bg-black border border-white/10 hover:border-yellow-500 rounded-xl overflow-hidden transition-all duration-300 hover:shadow-lg hover:shadow-yellow-500/10 group flex flex-col cursor-pointer">

    <div class="w-full aspect-square bg-white/5 group-hover:bg-yellow-500/10 transition overflow-hidden">
        <img [src]="servicio.urlsMultimedia?.[0] | safeImageUrl" [alt]="servicio.nombre" (error)="img.src='/assets/cortebarba.jpg'" #img class="w-full h-full object-cover transform group-hover:scale-110 transition duration-300" />
    </div>

    <div class="p-3 flex flex-col flex-1">
        <app-status-badge type="text" [value]="servicio.categoriaNombre" class="producto-card-category" />
        <p class="text-gray-400 text-xs leading-relaxed mb-3 flex-1">{{ servicio.categoriaNombre }}</p>
        <div class="flex items-center justify-between pt-2 border-t border-white/10">
            <span class="text-yellow-500 font-bold text-lg">{{ servicio.precio | soles }}</span>
            <span class="text-gray-500 text-xs flex items-center gap-1">
                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>{{ servicio.duracion }} min
            </span>
        </div>
    </div>
</div>
