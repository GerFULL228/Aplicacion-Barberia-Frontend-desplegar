<!-- Hero -->
<section class="relative h-64 sm:h-80 w-full flex items-center justify-center overflow-hidden">
  <div class="absolute inset-0">
    <img src="/assets/cortebarba.jpg" alt="Servicios Barbería" class="w-full h-full object-cover object-center" />
    <div class="absolute inset-0 bg-black/70"></div>
  </div>
  <div class="relative z-10 text-center px-6 max-w-3xl">
    <p class="text-yellow-500 text-sm font-semibold tracking-widest uppercase mb-3">Lo que ofrecemos</p>
    <h1 class="text-4xl md:text-5xl font-bold tracking-wide uppercase text-white">Nuestros Servicios</h1>
    <p class="mt-4 text-gray-300 text-lg">Precisión, estilo y cuidado en cada corte.</p>
  </div>
</section>
>
<section class="bg-black py-10 px-4">
  <div class="mx-auto max-w-7xl flex flex-col gap-6">

    <app-filtros [fields]="filtrosFields" titulo="Filtrar servicios" (buscar)="onBuscar($event)" (limpiar)="onLimpiar()" />

    <div class="flex items-center justify-between text-sm text-gray-400">
      <span>{{ totalRecords }} servicio(s) disponible(s)</span>
      @if (cargando) { <span>Cargando...</span> }
    </div>

    <div class="mt-8">
      <app-servicio-lista [servicios]="servicios" />
		</div>
  

    @if (totalRecords > size) { 
      <p-paginator [first]="page * size" [rows]="size" [totalRecords]="totalRecords" [rowsPerPageOptions]="[10, 20, 50]" [showCurrentPageReport]="true" currentPageReportTemplate="Página {currentPage} de {totalPages} · {totalRecords} servicio(s)" (onPageChange)="onPaginatorChange($event)" />
    }

  </div>
</section>

<!-- CTA -->
<section class="bg-black border-t border-white/10 py-16 px-4">
  <div class="max-w-2xl mx-auto text-center">
    <h2 class="text-white text-3xl font-bold uppercase tracking-wide">¿Listo para el cambio?</h2>
    <p class="mt-4 text-gray-300 text-lg">Reserva tu cita ahora y déjate atender por los mejores.</p>
    <div class="mt-8 flex justify-center gap-4 flex-wrap">
      <button class="bg-yellow-500 hover:bg-yellow-600 text-black font-semibold px-6 py-3 rounded-full transition">
        Reservar cita
      </button>
      <button class="border border-white hover:bg-white hover:text-black text-white px-6 py-3 rounded-full transition">
        Ver más
      </button>
    </div>
  </div>
</section>

<!-- Modal detalle -->
@if (mostrarModal) {
<app-servicio-detalle [servicio]="servicioSeleccionado" [cargando]="cargandoDetalle" (cerrar)="cerrarModal()"
  (reservar)="irAReservar()" />
}
