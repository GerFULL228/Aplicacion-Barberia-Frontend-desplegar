<section class="producto-page-hero">
	<div class="absolute inset-0">
		<img src="/assets/cortebarba.jpg" alt="Productos Barbería"
			class="h-full w-full object-cover object-[center_60%] opacity-30" />
		<div class="producto-page-overlay"></div>
	</div>

	<div class="producto-page-hero-inner">
		<div class="max-w-3xl">
			<p class="mb-3 text-sm font-semibold uppercase tracking-[0.35em] text-yellow-400">Tienda</p>
			<h1 class="text-4xl font-black uppercase tracking-wide sm:text-5xl">Nuestros Productos</h1>
			<p class="mt-4 max-w-2xl text-base text-gray-300 sm:text-lg">Explora los productos disponibles para mantener tu estilo en casa con una búsqueda rápida y filtros claros.</p>
		</div>
	</div>
</section>

<section class="producto-page-section">
	<div class="mx-auto max-w-7xl">
		<app-filtros [fields]="filtrosFields" [titulo]="texto" (buscar)="onBuscar($event)"(limpiar)="onLimpiar()" [text]="texto"/>

		<div class="producto-page-summary">
			<span>{{ totalRecords || productos.length }} producto(s) encontrado(s)</span>
			@if (cargando) {
				<span>Cargando productos...</span>
			}
		</div>

		<div class="mt-8">
			<app-producto-lista [productos]="productos" />
		</div>

		<div class="producto-page-paginator">
			<p-paginator [first]="page * size" [rows]="size" [totalRecords]="totalRecords" [rowsPerPageOptions]="[8, 12, 24, 48]" [showCurrentPageReport]="true"  currentPageReportTemplate="Página {currentPage} de {totalPages} · {totalRecords} producto(s)" (onPageChange)="onPaginatorChange($event)"></p-paginator>
		</div>
	</div>
</section>
