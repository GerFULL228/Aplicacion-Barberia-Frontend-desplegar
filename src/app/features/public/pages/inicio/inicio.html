<section class="relative h-screen w-full flex items-center justify-center text-text-primary">

  <!-- Fondo -->
  <div class="absolute inset-0">
    <img 
      src="/assets/cortebarba.jpg" 
      alt="Barbería"
      class="w-full h-full object-cover"
    />
    <!-- Overlay oscuro elegante -->
    <div class="absolute inset-0 bg-black/70"></div>
  </div>

  <!-- Contenido -->
  <div class="relative z-10 text-center px-6 max-w-3xl">
    
    <h1 class="text-4xl md:text-6xl font-bold tracking-wide uppercase">
      Estilo que habla por ti 
    </h1>

    <p class="mt-6 text-lg md:text-xl text-text-secondary">
      Cortes modernos, precisión y elegancia. Vive la experiencia de una barbería premium.
    </p>

    <div class="mt-8 flex justify-center gap-4">
      <button pButtton (click)="reservarCita()" class="boton-primary"> Reservar cita </button>
      <button pButton (click)="verServicios()" class="boton-secondary"> Ver servicios </button>
    </div>

  </div>

</section>
