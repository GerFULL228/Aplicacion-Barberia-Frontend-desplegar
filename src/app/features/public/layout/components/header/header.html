<header
  class="fixed left-0 top-0 z-50 w-full border-b border-ui-border bg-ui-black/95 px-2 backdrop-blur-xl sm:px-4 lg:px-6 xl:px-8">
  <div class="container-main flex w-full flex-wrap items-center justify-between gap-4 py-4 sm:h-22 sm:flex-nowrap sm:py-0">

    <!-- Logo -->
    <a routerLink="/" class="flex items-center gap-3">
      <app-logo variant="icon" size="sm"></app-logo>
      <span class="text-xl font-bold leading-none tracking-tight text-brand-white sm:text-2xl lg:text-[32px]">Fadex</span>
    </a>

    <!-- Nav desktop -->
    <nav class="hidden items-center gap-6 lg:flex xl:gap-11">
      <ng-container *ngFor="let p of publicNav  ">
        <a [routerLink]="p.path" routerLinkActive="!text-white"
          class="group relative pb-1 text-sm font-medium text-brand-white transition-colors hover:text-brand-gold sm:text-base">
          {{ p.label }}
          <span
            class="absolute bottom-0 left-1/2 h-0.5 w-0 rounded bg-brand-gold transition-all duration-300 group-hover:left-0 group-hover:w-full"></span>
        </a>
      </ng-container>
    </nav>

    <!-- Derecha desktop -->
    <div class="hidden items-center gap-5 lg:flex">
      <!-- Carrito siempre visible -->
      <a routerLink="/carrito"
        class="relative flex h-9 w-9 items-center justify-center rounded-lg transition-all hover:bg-ui-surface hover:text-brand-gold text-brand-white">
        <i class="pi pi-shopping-cart text-lg"></i>
        <span class="absolute -right-1 -top-1 flex h-5 w-5 items-center justify-center rounded-full bg-brand-gold text-xs font-bold text-black">0</span>
      </a>

      @if (isAuthenticated) {
        <!-- Iconos de utilidad (solo auth) -->
        <div class="flex items-center gap-4 border-r border-ui-border pr-5">
          <!-- Notificaciones -->
          <button
            class="relative flex h-9 w-9 items-center justify-center rounded-lg transition-all hover:bg-ui-surface hover:text-brand-gold text-brand-white">
            <i class="pi pi-bell text-lg"></i>
            <span class="absolute -right-1 -top-1 flex h-5 w-5 items-center justify-center rounded-full bg-brand-gold text-xs font-bold text-black">2</span>
          </button>

          <!-- Favoritos -->
          <button
            class="flex h-9 w-9 items-center justify-center rounded-lg transition-all hover:bg-ui-surface hover:text-brand-gold text-brand-white">
            <i class="pi pi-heart text-lg"></i>
          </button>

          <!-- Soporte/Chat -->
          <button
            class="flex h-9 w-9 items-center justify-center rounded-lg transition-all hover:bg-ui-surface hover:text-brand-gold text-brand-white">
            <i class="pi pi-comments text-lg"></i>
          </button>
        </div>

        <!-- Perfil -->
        <a routerLink="/mi-cuenta"
          class="flex h-10 w-10 items-center justify-center rounded-full bg-brand-gold text-black transition-all hover:bg-brand-gold-hover hover:scale-110">
          <i class="pi pi-user text-lg"></i>
        </a>
      } @else {
        <a routerLink="/login"
          class="rounded-full bg-brand-gold px-7 py-3 text-sm font-bold uppercase tracking-wide text-black transition-colors hover:bg-brand-gold-hover xl:px-9 xl:py-3.5">
          Login
        </a>
      }
    </div>

    <!-- Nav mobile -->
    <details class="group relative w-full lg:hidden">
      <summary
        class="flex list-none items-center justify-between rounded-md border border-ui-border bg-ui-surface px-4 py-3 text-sm font-semibold uppercase tracking-[0.16em] text-brand-white transition hover:text-brand-gold">
        Menú
        <span class="transition group-open:rotate-180">⌄</span>
      </summary>

      <nav class="mt-3 grid gap-2 rounded-2xl border border-ui-border bg-ui-surface p-3">
        <ng-container *ngFor="let p of publicNav">
          <a [routerLink]="p.path"
            class="rounded-xl px-3 py-2 text-sm font-medium text-brand-white transition hover:bg-brand-gold/10 hover:text-brand-gold">{{ p.label }}</a>
        </ng-container>
        <!-- Iconos utilidad mobile: carrito siempre visible -->
        <div class="mt-2 grid grid-cols-4 gap-2 border-t border-ui-border pt-3">
          <a routerLink="/carrito"
            class="relative flex flex-col items-center justify-center gap-1 rounded-lg p-2 transition hover:bg-ui-elevated hover:text-brand-gold text-brand-white text-xs">
            <i class="pi pi-shopping-cart"></i>
            <span class="font-xs">Carrito</span>
            <span class="absolute -right-1 -top-1 flex h-4 w-4 items-center justify-center rounded-full bg-brand-gold text-xs font-bold text-black">0</span>
          </a>

          @if (isAuthenticated) {
            <button
              class="relative flex flex-col items-center justify-center gap-1 rounded-lg p-2 transition hover:bg-ui-elevated hover:text-brand-gold text-brand-white text-xs">
              <i class="pi pi-bell"></i>
              <span class="font-xs">Avisos</span>
              <span class="absolute -right-1 -top-1 flex h-4 w-4 items-center justify-center rounded-full bg-brand-gold text-xs font-bold text-black">2</span>
            </button>

            <button
              class="flex flex-col items-center justify-center gap-1 rounded-lg p-2 transition hover:bg-ui-elevated hover:text-brand-gold text-brand-white text-xs">
              <i class="pi pi-heart"></i>
              <span class="font-xs">Favoritos</span>
            </button>

            <button
              class="flex flex-col items-center justify-center gap-1 rounded-lg p-2 transition hover:bg-ui-elevated hover:text-brand-gold text-brand-white text-xs">
              <i class="pi pi-comments"></i>
              <span class="font-xs">Soporte</span>
            </button>
          } @else {
            <div class="col-span-3 flex items-center justify-center">
              <a routerLink="/login" class="rounded-xl bg-brand-gold px-3 py-2 text-center text-sm font-bold uppercase tracking-wide text-black transition hover:bg-brand-gold-hover">Login</a>
            </div>
          }
        </div>
      </nav>
    </details>
  </div>
</header>
