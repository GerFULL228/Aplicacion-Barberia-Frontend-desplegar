<div class="flex flex-col items-center gap-3">
    <p class="text-brand-gold text-sm font-medium">{{ ruletaNombre }}</p>

    @if (cargando) {
    <div class="flex items-center justify-center gap-2 py-10 text-xs text-text-tertiary">
        <i class="pi pi-spin pi-spinner"></i> Cargando ruleta...
    </div>
    } @else if (error) {
    <p class="text-xs text-text-tertiary py-6 text-center">{{ error }}</p>
    } @else if (!segmentos.length) {
    <p class="text-xs text-text-tertiary py-6 text-center">Esta ruleta aún no tiene premios configurados.</p>
    } @else {
    <app-ruleta-grafico [premios]="segmentos" [interactiva]="interactiva" [reproducirMusica]="musicaActiva"
        [textoBoton]="textoBoton" [modoServidor]="true" (girarSolicitado)="onGirarSolicitado()" />
    }
</div>
