<div class="overflow-hidden rounded-2xl border border-brand-gold/15 bg-[#0c0c0a] shadow-[0_10px_30px_rgba(0,0,0,0.2)]">
	<div class="flex items-center justify-between border-b border-brand-gold/10 px-4 py-4 md:px-5">
		<div>
			<p class="mb-1 text-[0.78rem] uppercase tracking-[0.18em] text-brand-gold">Credenciales</p>
			<h2 class="m-0 text-lg font-semibold text-gray-100">Datos de acceso del cliente</h2>
		</div>
		<button type="button" class="rounded-full border border-brand-gold/25 bg-brand-gold/10 px-3 py-1 text-xs font-semibold text-brand-gold transition-colors hover:bg-brand-gold/15 hover:border-brand-gold/40">Editar</button>
	</div>

	<div class="divide-y divide-brand-gold/10">
		<div class="flex flex-col gap-2 px-4 py-4 md:flex-row md:items-center md:gap-4 md:px-5">
			<div class="w-28 shrink-0 text-sm font-medium text-brand-gold">Usuario:</div>
			<div class="md:border-l md:border-brand-gold/10 md:pl-4 text-base font-semibold text-gray-100">{{ usuario }}</div>
		</div>

		<div class="flex flex-col gap-2 px-4 py-4 md:flex-row md:items-center md:gap-4 md:px-5">
			<div class="w-28 shrink-0 text-sm font-medium text-brand-gold">Contraseña:</div>
			<div class="md:border-l md:border-brand-gold/10 md:pl-4 text-base font-semibold text-gray-100">{{ contrasena }}</div>
		</div>

		<div class="flex justify-end px-4 py-4 md:px-5">
			<button
				type="button"
				class="rounded-xl border border-amber-300/40 bg-amber-300/10 px-4 py-2 text-sm font-semibold text-amber-200 transition hover:-translate-y-0.5 hover:border-amber-200 hover:bg-amber-300/20"
				(click)="onResetPassword()"
			>
				Resetear contraseña
			</button>
		</div>
	</div>
</div>
