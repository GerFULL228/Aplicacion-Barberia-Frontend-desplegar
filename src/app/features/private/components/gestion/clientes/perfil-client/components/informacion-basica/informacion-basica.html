
<p-toast position="top-right"></p-toast>
<div class="overflow-hidden rounded-2xl border border-brand-gold/15 bg-[#0c0c0a] shadow-[0_10px_30px_rgba(0,0,0,0.2)]">

	<div class="flex items-center justify-between border-b border-brand-gold/10 px-4 py-4 md:px-5">

		<div>
			<p class="mb-1 text-[0.78rem] uppercase tracking-[0.18em] text-brand-gold">
				Información básica
			</p>

			<h2 class="m-0 text-lg font-semibold text-gray-100">
				Datos principales del cliente
			</h2>
		</div>

		@if (!editando) {

			<button
				type="button"
				(click)="activarEdicion()"
				class="rounded-full border border-brand-gold/25 bg-brand-gold/10 px-3 py-1 text-xs font-semibold text-brand-gold transition-colors hover:bg-brand-gold/15 hover:border-brand-gold/40">

				Editar

			</button>
		}

	</div>

	<div class="divide-y divide-brand-gold/10">

		@if (!editando) {

			<div class="flex flex-col gap-2 px-4 py-4 md:flex-row md:items-center md:gap-4 md:px-5">
				<div class="w-28 shrink-0 text-sm font-medium text-brand-gold">
					Nombre:
				</div>

				<div class="md:border-l md:border-brand-gold/10 md:pl-4 text-base font-semibold text-gray-100">
					{{ nombre }}
				</div>
			</div>

			<div class="flex flex-col gap-2 px-4 py-4 md:flex-row md:items-center md:gap-4 md:px-5">
				<div class="w-28 shrink-0 text-sm font-medium text-brand-gold">
					Apellido:
				</div>

				<div class="md:border-l md:border-brand-gold/10 md:pl-4 text-base font-semibold text-gray-100">
					{{ apellido }}
				</div>
			</div>

			<div class="flex flex-col gap-2 px-4 py-4 md:flex-row md:items-center md:gap-4 md:px-5">
				<div class="w-28 shrink-0 text-sm font-medium text-brand-gold">
					Teléfono:
				</div>

				<div class="md:border-l md:border-brand-gold/10 md:pl-4 text-base font-semibold text-gray-100">
					{{ telefono }}
				</div>
			</div>

			<div class="flex flex-col gap-2 px-4 py-4 md:flex-row md:items-center md:gap-4 md:px-5">
				<div class="w-28 shrink-0 text-sm font-medium text-brand-gold">
					Email:
				</div>

				<div class="md:border-l md:border-brand-gold/10 md:pl-4 text-base font-semibold text-gray-100">
					{{ email }}
				</div>
			</div>

			<div class="flex flex-col gap-2 px-4 py-4 md:flex-row md:items-center md:gap-4 md:px-5">
				<div class="w-28 shrink-0 text-sm font-medium text-brand-gold">
					Registro:
				</div>

				<div class="md:border-l md:border-brand-gold/10 md:pl-4 text-base font-semibold text-gray-100">
					{{ registro }}
				</div>
			</div>
		}

		@if (editando) {

			<form
				[formGroup]="form"
				class="space-y-4 p-5">

				<div>
					<label class="mb-2 block text-sm text-brand-gold">
						Nombre
					</label>

					<input
						type="text"
						formControlName="nombre"
						class="w-full rounded-xl border border-brand-gold/20 bg-black px-4 py-3 text-white outline-none">
				</div>

				<div>
					<label class="mb-2 block text-sm text-brand-gold">
						Apellido
					</label>

					<input
						type="text"
						formControlName="apellido"
						class="w-full rounded-xl border border-brand-gold/20 bg-black px-4 py-3 text-white outline-none">
				</div>

				<div>
					<label class="mb-2 block text-sm text-brand-gold">
						Teléfono
					</label>

					<input
						type="text"
						formControlName="telefono"
						class="w-full rounded-xl border border-brand-gold/20 bg-black px-4 py-3 text-white outline-none">
				</div>

				<div>
					<label class="mb-2 block text-sm text-brand-gold">
						Email
					</label>

					<input
						type="email"
						formControlName="email"
						class="w-full rounded-xl border border-brand-gold/20 bg-black px-4 py-3 text-white outline-none">
				</div>

				<div class="flex justify-end gap-3 pt-2">

					<button
						type="button"
						(click)="cancelar()"
						class="rounded-xl border border-gray-700 px-4 py-2 text-sm text-gray-300">

						Cancelar

					</button>

					<button
						type="button"
						(click)="guardar()"
						[disabled]="cargando"
						class="rounded-xl bg-brand-gold px-4 py-2 text-sm font-semibold text-black">

						{{ cargando ? 'Guardando...' : 'Guardar' }}

					</button>

				</div>

			</form>
		}

	</div>

</div>
