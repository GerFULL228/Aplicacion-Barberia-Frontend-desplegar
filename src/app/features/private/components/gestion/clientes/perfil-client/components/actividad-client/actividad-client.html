<!-- actividad-client.html -->

<div class="rounded-2xl border border-brand-gold/15 bg-[#0c0c0a] shadow-[0_10px_30px_rgba(0,0,0,0.25)] overflow-hidden">

	<!-- Header -->
	<div class="flex items-center gap-3 border-b border-brand-gold/10 px-5 py-4">
		<h2 class="text-sm font-semibold tracking-[0.15em] text-brand-gold uppercase">
			Actividad reciente
		</h2>

		<span class="text-sm text-gray-400">
			{{ clienteNombre }}
		</span>
	</div>

	<!-- Timeline -->
	<div class="relative px-5 py-5">

		<!-- Línea vertical -->
		<div class="absolute left-[26px] top-0 h-full w-px bg-brand-gold/15"></div>

		<!-- Item -->
		<div *ngFor="let actividad of actividades" class="relative mb-8 flex gap-4 last:mb-0">
			<!-- Punto -->
			<div class="relative z-10 mt-1.5 h-4 w-4 rounded-full border-2 border-[#0c0c0a]"
				[ngClass]="obtenerColor(actividad.tipo)"></div>

			<!-- Contenido -->
			<div class="min-w-0">
				<p class="mb-1 text-sm font-semibold" [ngClass]="actividad.color">
					{{ actividad.titulo }}
				</p>

				<p class="text-sm text-gray-200">
					{{ actividad.descripcion }}
				</p>

				<p class="mt-1 text-xs text-gray-500">
					{{ actividad.fecha | date:'dd MMM yyyy - HH:mm' }}
				</p>
			</div>
		</div>

	</div>

	<!-- Botón -->
	<div *ngIf="actividades.length > 0" class="border-t border-brand-gold/10 px-5 py-4">

		<button (click)="abrirModal()" class="text-sm font-medium text-brand-gold transition hover:text-yellow-300">
			Seguir actividades →
		</button>

	</div>

	<!-- MODAL -->

	<div *ngIf="mostrarModal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/70 backdrop-blur-sm">

		<div class="w-full max-w-5xl h-[80vh] overflow-hidden rounded-2xl border border-brand-gold/10 bg-[#111] shadow-2xl">

			<!-- HEADER -->
			<div class="flex items-center justify-between border-b border-brand-gold/10 px-6 py-4">

				<h2 class="text-lg font-semibold text-brand-gold">
					Historial de actividades
				</h2>

				<button (click)="cerrarModal()" class="text-gray-400 hover:text-white">
					✕
				</button>

			</div>

			<!-- FILTROS -->
			<div class="flex gap-3 border-b border-brand-gold/10 px-6 py-4">

				<button (click)="filtrar('TODOS')" class="rounded-full border px-4 py-1 text-sm"
					[class.bg-brand-gold]="filtroActual === 'TODOS'">
					Todos
				</button>

				<button (click)="filtrar('CORTE')" class="rounded-full border px-4 py-1 text-sm"
					[class.bg-yellow-500]="filtroActual === 'CORTE'">
					Cortes
				</button>

				<button (click)="filtrar('PAGO')" class="rounded-full border px-4 py-1 text-sm"
					[class.bg-sky-500]="filtroActual === 'PAGO'">
					Pagos
				</button>

				<button (click)="filtrar('COMPRA')" class="rounded-full border px-4 py-1 text-sm"
					[class.bg-emerald-500]="filtroActual === 'COMPRA'">
					Compras
				</button>

			</div>

			<!-- CONTENIDO -->
			<div class="h-[calc(80vh-140px)] overflow-y-auto px-6 py-5">

				<div *ngFor="let actividad of actividadesFiltradas" class="mb-6 flex gap-4">

					<div class="mt-1 h-4 w-4 rounded-full border-2 border-[#111]"
						[ngClass]="obtenerColor(actividad.tipo)"></div>

					<div>

						<p class="font-semibold" [ngClass]="obtenerTextColor(actividad.tipo)">
							{{ actividad.titulo }}
						</p>

						<p class="text-sm text-gray-300">
							{{ actividad.descripcion }}
						</p>

						<p class="text-xs text-gray-500">
							{{ actividad.fecha | date:'dd MMM yyyy - HH:mm' }}
						</p>

					</div>

				</div>

			</div>

		</div>

	</div>
</div>
