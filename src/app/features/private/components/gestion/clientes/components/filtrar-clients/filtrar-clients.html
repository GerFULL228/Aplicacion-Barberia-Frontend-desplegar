<div class="p-4 md:p-6 lg:p-8">
	<div class="w-full rounded-2xl border border-amber-500/15 bg-zinc-950/95 p-4 shadow-[0_20px_60px_rgba(0,0,0,0.35)] backdrop-blur-sm md:p-5">
		<div class="flex flex-wrap gap-3">
			@for (filter of filters; track filter.key) {
				<button
					type="button"
					class="group flex min-h-14 min-w-40 flex-1 flex-col justify-center rounded-xl px-4 py-3 text-left transition duration-150"
					[class]="activeFilter === filter.key
						? 'border border-amber-400/70 bg-linear-to-b from-amber-900/70 to-amber-950/90 shadow-[0_0_0_1px_rgba(245,200,76,0.12)] hover:-translate-y-0.5 hover:border-amber-300'
						: filter.key === 'deshabilitados'
						? 'border border-rose-500/12 bg-linear-to-b from-zinc-900 to-zinc-950 hover:-translate-y-0.5 hover:border-rose-400/30'
						: 'border border-amber-500/15 bg-linear-to-b from-zinc-900 to-zinc-950 hover:-translate-y-0.5 hover:border-amber-500/30 hover:from-zinc-800 hover:to-zinc-900'"
					(click)="selectFilter(filter.key)"
				>
					<span class="flex items-center gap-3">
						<!-- icon -->
						<svg [hidden]="filter.key !== 'deshabilitados'" width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" class="shrink-0">
							<path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z" fill="currentColor" class="text-rose-600/20" />
							<path d="M15 9l-6 6" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
						</svg>
						<span [class.text-rose-300]="filter.key === 'deshabilitados' && activeFilter !== filter.key" class="text-sm font-bold leading-none text-amber-300">{{ filter.label }}</span>
					</span>
					<span class="mt-1 text-xs leading-none" [class.text-rose-400]="filter.key === 'deshabilitados'">{{ filter.subtitle }}</span>
				</button>
			}
		</div>

		@if (isCustomMode) {
			<div class="mt-4 rounded-2xl border border-amber-500/15 bg-linear-to-b from-zinc-950 to-zinc-900 p-4 md:p-5">
				<div class="mb-4 flex items-start justify-between gap-4">
					<div>
						<p class="text-sm font-bold uppercase tracking-[0.12em] text-amber-300">Filtrado personalizado</p>
						<p class="mt-1 text-sm text-zinc-400">Elige año, mes o rango y pulsa Buscar. Las demás secciones siguen arriba.</p>
					</div>
				</div>

				<div class="grid grid-cols-1 gap-3 md:grid-cols-2 xl:grid-cols-4">
					<div class="flex flex-col gap-1.5">
						<label for="filterYear" class="text-[0.72rem] font-bold uppercase tracking-[0.12em] text-zinc-400">Año</label>
						<select id="filterYear" class="h-12 w-full rounded-xl border border-amber-500/15 bg-zinc-950 px-3 text-sm text-amber-300 outline-none transition focus:border-amber-400 focus:ring-1 focus:ring-amber-400/20" [value]="draftYear ?? ''" (change)="onYearChange($any($event.target).value)">
							<option class="bg-zinc-950 text-zinc-100" [value]="''">Todos</option>
							@for (year of years; track trackYear($index, year)) {
								<option class="bg-zinc-950 text-zinc-100" [value]="year">{{ year }}</option>
							}
						</select>
					</div>

					<div class="flex flex-col gap-1.5">
						<label for="filterMonth" class="text-[0.72rem] font-bold uppercase tracking-[0.12em] text-zinc-400">Mes</label>
						<select id="filterMonth" class="h-12 w-full rounded-xl border border-amber-500/15 bg-zinc-950 px-3 text-sm text-amber-300 outline-none transition focus:border-amber-400 focus:ring-1 focus:ring-amber-400/20" [value]="draftMonth ?? ''" (change)="onMonthChange($any($event.target).value)">
							<option class="bg-zinc-950 text-zinc-100" [value]="''">Todos</option>
							@for (month of months; track trackMonth($index, month)) {
								<option class="bg-zinc-950 text-zinc-100" [value]="month.value">{{ month.label }}</option>
							}
						</select>
					</div>

					<div class="flex flex-col gap-1.5">
						<label for="fromDate" class="text-[0.72rem] font-bold uppercase tracking-[0.12em] text-zinc-400">Desde</label>
						<input id="fromDate" class="h-12 w-full rounded-xl border border-amber-500/15 bg-zinc-950 px-3 text-sm text-amber-300 outline-none transition placeholder:text-zinc-600 focus:border-amber-400 focus:ring-1 focus:ring-amber-400/20" type="date" [value]="draftFromDate" (change)="onFromDateChange($any($event.target).value)" />
					</div>

					<div class="flex flex-col gap-1.5">
						<label for="toDate" class="text-[0.72rem] font-bold uppercase tracking-[0.12em] text-zinc-400">Hasta</label>
						<input id="toDate" class="h-12 w-full rounded-xl border border-amber-500/15 bg-zinc-950 px-3 text-sm text-amber-300 outline-none transition placeholder:text-zinc-600 focus:border-amber-400 focus:ring-1 focus:ring-amber-400/20" type="date" [value]="draftToDate" (change)="onToDateChange($any($event.target).value)" />
					</div>
				</div>

				<div class="mt-4 flex flex-col gap-2 sm:flex-row sm:justify-end">
					<button type="button" class="inline-flex items-center justify-center rounded-xl border border-amber-500/20 px-4 py-2.5 text-sm font-bold text-zinc-200 transition hover:border-amber-400/40 hover:bg-amber-400/10" (click)="limpiarPersonalizado()">Limpiar</button>
					<button type="button" class="inline-flex items-center justify-center rounded-xl border border-amber-300/60 bg-linear-to-b from-amber-300/25 to-amber-400/15 px-4 py-2.5 text-sm font-bold text-amber-200 transition hover:-translate-y-0.5 hover:border-amber-200 hover:bg-amber-400/20" (click)="buscarPersonalizado()">Buscar</button>
				</div>
			</div>
		}
	</div>
</div>
