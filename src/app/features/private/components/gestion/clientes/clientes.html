<div class="mt-5">
	<app-header-client [title]="'Clientes'" [icon]="icono" [description]="'Gestión y administración de clientes'" [buttonLabel]="'Nuevo'" (create)="abrirCrear()" (search)="onSearch($event)"></app-header-client>
</div>

<div class="mt-5">
	<app-resumen-general-client></app-resumen-general-client>
</div>

<div class="mt-3">
	<app-filtrar-clients
		[activeFilter]="activeFilter"
		[selectedYear]="filterCriteria.year"
		[selectedMonth]="filterCriteria.month"
		[fromDate]="filterCriteria.fromDate"
		[toDate]="filterCriteria.toDate"
		(filterChange)="onFilterChange($event)"
		(customModeChange)="onCustomModeChange($event)">
	</app-filtrar-clients>
</div>

<div class="mt-1 border-t border-gray-800/70 pt-1">
	<app-table-client
		[clients]="visibleClients"
		[totalElements]="totalElements"
		[currentPage]="currentPage"
		[totalPages]="totalPages"
		(prev)="onPrevPage()"
		(next)="onNextPage()">
	</app-table-client>
</div>
