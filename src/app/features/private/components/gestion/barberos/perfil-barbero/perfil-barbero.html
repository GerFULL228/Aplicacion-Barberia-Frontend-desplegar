<div class="perfil-barbero">

	<div *ngIf="loading"
		class="mt-6 rounded-2xl border border-brand-gold/15 bg-[#0c0c0a] px-6 py-4 text-sm text-gray-400">
		Cargando perfil del barbero...
	</div>

	<div *ngIf="errorMessage"
		class="mt-6 rounded-2xl border border-red-500/20 bg-red-500/10 px-6 py-4 text-sm text-red-300">
		{{ errorMessage }}
	</div>

	<div class="mt-6 md:mt-8">
		<app-header-perfil-barbero [barberoNombre]="barberoNombre" [barberoIniciales]="barberoIniciales"
			[barberoDescripcion]="barberoDescripcion" [volver]="volver">
		</app-header-perfil-barbero>
	</div>

	<div class="mt-6 md:mt-8">
		<app-datos-basicos-perfil-barbero [barberoId]="barberoId" [personaId]="personaId" [nombre]="nombre"
			[apellido]="apellido" [telefono]="telefono" [email]="email" [fechaIngreso]="fechaIngreso"
			[experiencia]="experiencia" [sueldo]="sueldo" [comision]="comision" [descripcion]="descripcion">
		</app-datos-basicos-perfil-barbero>
	</div>

	<div class="mt-6 md:mt-8">
		<app-credenciales-perfil-barbero [usuario]="usuario" [contrasena]="contrasena" [idUsuario]="idUsuario" (passwordReset)="onPasswordReset()" (usernameUpdate)="onUsernameUpdate()">
		</app-credenciales-perfil-barbero>
	</div>
</div>
