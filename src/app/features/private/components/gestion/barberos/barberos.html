<div class="mt-5">
	<app-header-barbero></app-header-barbero>
</div>

<div class="mt-5">
	<app-resumen-general-barbero></app-resumen-general-barbero>
</div>

<section class="mt-1 section-shell section-shell--main">
	<div class="section-header">
		<div>
			<div class="section-badge">
				<span>👥</span>
				<span>Sección principal</span>
			</div>
			<h2 class="section-title">
				Gestión de barberos
			</h2>
			<p class="section-copy">
				Administración general del personal y actividad.
			</p>
		</div>
		<div class="section-mark">
			✦
		</div>
	</div>

	<div class="section-content">
		<app-table-barbero
			[barberos]="barberos"
			[totalElements]="totalElements"
			[currentPage]="currentPage"
			[totalPages]="totalPages"
			(prev)="onPrev()"
			(next)="onNext()">
		</app-table-barbero>
	</div>
</section>
