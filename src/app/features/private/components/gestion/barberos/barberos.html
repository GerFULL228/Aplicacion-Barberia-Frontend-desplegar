<div class="mt-5">
  <app-header-barbero
    (search)="onSearch($event)">
  </app-header-barbero>
</div>

<div class="mt-5">
  <app-resumen-general-barbero></app-resumen-general-barbero>
</div>

<section class="mt-1 section-shell section-shell--main">
  <div class="section-header">
    <div>
      <div class="section-badge">
        <span>Gestion de barberos</span>
      </div>
    </div>
    <div class="section-mark">✦</div>
  </div>

  <div class="section-content">
    <app-filtrar-barbero
      (apply)="onApplyFilters($event)"
      (clear)="onClearFilters()">
    </app-filtrar-barbero>
    <app-table-barbero
      [barberos]="barberos"
      [totalElements]="totalElements"
      [currentPage]="currentPage"
      [totalPages]="totalPages"
      (prev)="onPrev()"
      (next)="onNext()">
    </app-table-barbero>
  </div>
</section>
