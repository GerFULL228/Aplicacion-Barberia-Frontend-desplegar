<!-- FILTROS -->
<div class="form-base mb-6">

	<div class="flex flex-col gap-4 lg:flex-row lg:items-start">

		<!-- IZQUIERDA: TÍTULO + DESCRIPCIÓN -->
		<div class="lg:flex-1">
			<h3 class="text-sm font-semibold tracking-[0.15em] text-brand-gold uppercase">FILTROS</h3>
			<p class="mt-1 text-sm text-text-secondary">Organiza y administra el listado de barberos.</p>
		</div>

		<!-- DERECHA: CONTROLES -->
		<div class="flex items-center gap-6 lg:ml-auto lg:items-end">

			<div class="filter-group">
				<label class="label-form">Estado</label>
				<select #statusSelect class="inputs-text w-45">
					<option value="">Todos</option>
					<option value="disponible">Disponible</option>
					<option value="ocupado">Ocupado</option>
				</select>
			</div>

			<div class="filter-group">
				<label class="label-form">Ordenar</label>
				<select #orderSelect class="inputs-text w-50">
					<option value="">Seleccionar</option>
					<option value="fechaIngreso_desc">Fecha (más recientes)</option>
					<option value="fechaIngreso_asc">Fecha (más antiguas)</option>
					<option value="experiencia_desc">Experiencia (mayor)</option>
					<option value="experiencia_asc">Experiencia (menor)</option>
					<option value="sueldo_desc">Sueldo (mayor)</option>
					<option value="sueldo_asc">Sueldo (menor)</option>
					<option value="comision_desc">Comisión (mayor)</option>
					<option value="comision_asc">Comisión (menor)</option>
				</select>
			</div>

			<div class="flex gap-3 actions">
				<button pButton type="button" class="p-button boton-secondary" (click)="onApply(statusSelect.value, orderSelect.value)">Aplicar</button>
				
				<button pButton type="button" class="p-button boton-ghost" (click)="onClear(statusSelect, orderSelect)"><i class="pi pi-filter-slash"></i> Limpiar</button>
				<button pButton type="button" class="p-button boton-secondary" (click)="onInhabilitados()">Inhabilitados</button>
			</div>

		</div>
	</div>
</div>
