<div class="flex flex-col gap-6 mt-5">
    <aside class="flex flex-col gap-4 md:flex-row md:items-center md:justify-between px-6 py-4 border-b border-brand-gold-soft bg-brand-black rounded-xl">
        <h1 class="text-lg font-semibold text-brand-gold  text-center md:text-start"> <i class="pi" [class]="icono"></i> Productos </h1>
        <app-search-bar placeholder="Buscar producto" (search)="buscarProductos($event)" />
        <button pButton label="Crear Producto" icon="pi pi-plus" class="p-button-sm boton-primary" (click)="abrirCrear()"></button>
    </aside>
    <app-filtros [fields]="filtrosFields" [titulo]="texto" [text]="texto" [acordeon]="true" (buscar)="onBuscar($event)" (limpiar)="onLimpiar()"/>
    <app-producto-table [productos]="productos" [cargado]="cargado" [totalRecords]="totalRecords" [rows]="rows" (lazyLoad)="onLazyLoad($event)" [icono]="icono" (estado)="onCambiarEstado($event)" (publicado)="onCambiarPublicado($event)" (editar)="abrirEditar($event)" (eliminar)="eliminarProducto($event)" (ver)="abrirVer($event)" />
</div>
<p-dialog [(visible)]="mostrarFormulario" [modal]="true" [dismissableMask]="true" [closable]="true" [style]="{ width: '90vw', maxWidth: '80rem' }" (onHide)="onDialogHide()">
    <ng-template pTemplate="header">
        <app-dialog-header [icono]="icono" [title]="productoSeleccionado ? 'Editar Producto' : 'Crear Producto'" [mode]="productoSeleccionado ? 'editar' : 'crear'" />
    </ng-template>
    <app-producto-form [producto]="productoSeleccionado" [categorias]="categorias" [resetTrigger]="resetFormTrigger" (guardar)="guardarProducto($event)" (cancelarEvento)="cerrarFormulario()" />
</p-dialog>
