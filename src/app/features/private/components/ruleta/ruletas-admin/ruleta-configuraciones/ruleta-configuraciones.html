<div class="flex flex-col gap-6 mt-5">
    <aside class="flex flex-col gap-4 md:flex-row md:items-center md:justify-between px-6 py-4 border-b border-brand-gold-soft bg-brand-black rounded-xl">
        <h1 class="text-lg font-semibold text-brand-gold text-center md:text-start"><i class="pi" [class]="icono"></i> Configuraciones</h1>
        <app-search-bar placeholder="Buscar por categoría" (search)="buscarConfiguraciones($event)" />
        <button pButton label="Nueva configuración" icon="pi pi-plus" class="p-button-sm boton-primary" (click)="abrirCrear()"></button>
    </aside>
    <app-filtros [fields]="filtrosFields" [titulo]="texto" [text]="texto" [acordeon]="true" (buscar)="onBuscar($event)" (limpiar)="onLimpiar()"/>
    <app-configuracion-table [configuraciones]="configuraciones" [cargado]="cargado" [totalRecords]="totalRecords" [rows]="rows" (lazyLoad)="onLazyLoad($event)" [icono]="icono" (estado)="onCambiarEstado($event)" (crearTarjeta)="onCambiarCrearTarjeta($event)" (mostrar)="onCambiarMostrarSiempre($event)" (editar)="abrirEditar($event)" (eliminar)="eliminarConfiguracion($event)" />
</div>

<p-dialog [(visible)]="mostrarFormulario" [modal]="true" [dismissableMask]="true" [closable]="true" [style]="{ width: '90vw', maxWidth: '50rem' }" (onHide)="onDialogHide()">
    <ng-template pTemplate="header">
        <app-dialog-header [icono]="icono" [title]="configuracionSeleccionada ? 'Editar Configuración' : 'Nueva Configuración'" [mode]="configuracionSeleccionada ? 'editar' : 'crear'" />
    </ng-template>
    <app-configuracion-form [configuracion]="configuracionSeleccionada" [categorias]="categorias" [ruletas]="ruletas" [resetTrigger]="resetFormTrigger" (guardar)="guardarConfiguracion($event)" (cancelarEvento)="cerrarFormulario()" />
</p-dialog>
