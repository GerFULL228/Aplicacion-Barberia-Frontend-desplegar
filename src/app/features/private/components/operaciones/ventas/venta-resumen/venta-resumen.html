<div class="grid grid-cols-1 md:grid-cols-3 gap-4">
    <div class="flex items-center gap-4 bg-[#121212] border border-white/10 rounded-xl p-5 hover:border-[#C9A84C]/30 transition-colors">
        <div class="w-12 h-12 rounded-xl bg-[#C9A84C]/10 flex items-center justify-center shrink-0">
            <i class="pi pi-shopping-cart text-xl text-[#C9A84C]"></i>
        </div>
        <div>
            <p class="text-xs text-[#666] uppercase tracking-widest mb-1">Total Ventas</p>
            <h2 class="text-2xl font-bold text-white">{{ totalVentas }}</h2>
        </div>
    </div>
    <div class="flex items-center gap-4 bg-[#121212] border border-white/10 rounded-xl p-5 hover:border-[#C9A84C]/30 transition-colors">
        <div class="w-12 h-12 rounded-xl bg-[#C9A84C]/10 flex items-center justify-center shrink-0">
            <i class="pi pi-dollar text-xl text-[#C9A84C]"></i>
        </div>
        <div>
            <p class="text-xs text-[#666] uppercase tracking-widest mb-1">Ingresos Totales</p>
            <h2 class="text-2xl font-bold text-[#C9A84C]">${{ ingresos | number:'1.2-2' }}</h2>
        </div>
    </div>
    <div class="flex items-center gap-4 bg-[#121212] border border-white/10 rounded-xl p-5 hover:border-[#C9A84C]/30 transition-colors">
        <div class="w-12 h-12 rounded-xl bg-[#C9A84C]/10 flex items-center justify-center shrink-0">
            <i class="pi pi-chart-line text-xl text-[#C9A84C]"></i>
        </div>
        <div>
            <p class="text-xs text-[#666] uppercase tracking-widest mb-1">Promedio por Venta</p>
            <h2 class="text-2xl font-bold text-white">${{ promedio | number:'1.2-2' }}</h2>
        </div>
    </div>
</div>
