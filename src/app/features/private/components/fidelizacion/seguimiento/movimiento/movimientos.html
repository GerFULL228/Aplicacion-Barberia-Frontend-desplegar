<div class="flex flex-col gap-6 mt-5">
    <aside
        class="flex flex-col gap-4 rounded-xl border border-brand-gold-soft bg-brand-black px-6 py-4 md:flex-row md:items-center md:justify-between">
        <h1 class="text-center text-lg font-semibold text-brand-gold md:text-start"><i class="pi" [class]="icono"></i>
            {{ texto }}</h1>
        <button pButton label="Nuevo ajuste" icon="pi pi-plus" class="p-button-sm boton-primary"
            (click)="abrirCrear()"></button>
    </aside>

    <app-filtros [fields]="filtrosFields" [titulo]="texto" [text]="texto" [acordeon]="true" (buscar)="onBuscar($event)"
        (limpiar)="onLimpiar()" />

    <app-movimiento-table [movimientos]="movimientos" [cargado]="cargado" [totalRecords]="totalRecords" [rows]="rows"
        (lazyLoad)="onLazyLoad($event)" (eliminar)="eliminarMovimiento($event)" />
</div>

<p-dialog [(visible)]="mostrarForm" [modal]="true" [dismissableMask]="true" [closable]="true"
    [style]="{ width: '90vw', maxWidth: '40rem' }">
    <ng-template pTemplate="header">
        <app-dialog-header [icono]="icono" title="Nuevo ajuste manual" mode="crear" />
    </ng-template>
    <app-movimiento-form (guardar)="guardarAjuste($event)" (cancelarEvento)="cerrarForm()" />
</p-dialog>
