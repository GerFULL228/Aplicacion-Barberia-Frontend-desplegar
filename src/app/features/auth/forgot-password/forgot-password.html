<section class="min-h-screen bg-black relative overflow-hidden flex items-center justify-center px-4 py-10">
  <div class="absolute top-10 left-10 opacity-5">
    <i class="pi pi-sliders-h text-[16rem] text-brand-gold rotate-90"></i>
  </div>

  <div class="absolute bottom-10 right-10 opacity-5">
    <i class="pi pi-sliders-h text-[16rem] text-brand-gold"></i>
  </div>

  <div class="relative z-10 w-full max-w-3xl rounded-2xl overflow-hidden border border-brand-gold/30 bg-[#0b0b0b] shadow-[0_0_30px_rgba(212,175,55,0.08)] p-8 lg:p-12">
    <div class="flex flex-col items-center text-center mb-8">
      <app-logo></app-logo>
      <p class="text-text-muted text-sm mt-2">Recupera tu contraseña</p>
    </div>

    <form [formGroup]="formulario" (ngSubmit)="submit()" class="flex flex-col gap-5">
      <div class="part-form">
        <label for="email">Correo electrónico</label>
        <input
          pInputText
          id="email"
          formControlName="email"
          placeholder="Ingrese su correo"
          autocomplete="email"
          class="input-auth"
        />
        <p-message
          *ngIf="campoInvalido('email')"
          severity="error"
          variant="simple"
          size="small"
          >El correo es obligatorio y debe ser válido</p-message
        >
      </div>

      <button pButton type="submit" label="Enviar solicitud" [loading]="loading" class="boton-primary w-full"></button>

      <div *ngIf="successMessage" class="rounded-xl border border-brand-gold/30 bg-[#121212] p-4 text-sm text-brand-gold">
        {{ successMessage }}
      </div>
      <div *ngIf="errorMessage" class="rounded-xl border border-red-500/20 bg-[#121212] p-4 text-sm text-red-400">
        {{ errorMessage }}
      </div>

      <p class="text-text-muted text-sm text-center mt-4">
        <a routerLink="/login" class="text-brand-gold hover:underline">Volver al login</a>
      </p>
    </form>
  </div>
</section>
