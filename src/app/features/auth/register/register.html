<!-- Register -->
<section class="min-h-screen bg-black flex items-center justify-center px-4 py-12">

  <div class="w-full max-w-md flex flex-col items-center gap-8">

    <!-- Logo -->
    <div class="flex flex-col items-center gap-3">
      <img src="/assets/logo.png" alt="Fadex Barber" class="w-20 h-20 object-contain" />
      <h1 class="text-white text-2xl font-bold tracking-widest uppercase">
        Fadex <span class="text-yellow-500">Barber</span>
      </h1>
      <p class="text-gray-500 text-sm">Crea tu cuenta y empieza a reservar</p>
    </div>

    <div class="w-full bg-[#0c0c0c] border border-white/10 rounded-2xl p-6 sm:p-8 flex flex-col gap-5">

      <!-- Nombre y Apellido -->
      <div class="grid grid-cols-2 gap-4">
        <div class="flex flex-col gap-2">
          <label class="text-white text-sm font-semibold">Nombre</label>
          <div class="relative">
            <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-500">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                  d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
              </svg>
            </span>
            <input type="text" placeholder="Juan"
              class="w-full bg-black border border-white/10 focus:border-yellow-500 text-white placeholder-gray-600 rounded-xl pl-9 pr-3 py-3 text-sm outline-none transition-all duration-200" />
          </div>
        </div>
        <div class="flex flex-col gap-2">
          <label class="text-white text-sm font-semibold">Apellido</label>
          <div class="relative">
            <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-500">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                  d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
              </svg>
            </span>
            <input type="text" placeholder="Pérez"
              class="w-full bg-black border border-white/10 focus:border-yellow-500 text-white placeholder-gray-600 rounded-xl pl-9 pr-3 py-3 text-sm outline-none transition-all duration-200" />
          </div>
        </div>
      </div>

      <!-- Teléfono -->
      <div class="flex flex-col gap-2">
        <label class="text-white text-sm font-semibold">Teléfono</label>
        <div class="relative">
          <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-500">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" />
            </svg>
          </span>
          <input type="tel" placeholder="+51 999 888 777"
            class="w-full bg-black border border-white/10 focus:border-yellow-500 text-white placeholder-gray-600 rounded-xl pl-10 pr-4 py-3 text-sm outline-none transition-all duration-200" />
        </div>
      </div>

      <!-- Email -->
      <div class="flex flex-col gap-2">
        <label class="text-white text-sm font-semibold">Correo electrónico</label>
        <div class="relative">
          <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-500">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
            </svg>
          </span>
          <input type="email" placeholder="tucorreo@email.com"
            class="w-full bg-black border border-white/10 focus:border-yellow-500 text-white placeholder-gray-600 rounded-xl pl-10 pr-4 py-3 text-sm outline-none transition-all duration-200" />
        </div>
      </div>

      <!-- Contraseña -->
      <div class="flex flex-col gap-2">
        <label class="text-white text-sm font-semibold">Contraseña</label>
        <div class="relative">
          <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-500">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
            </svg>
          </span>
          <input type="password" placeholder="Mínimo 8 caracteres"
            class="w-full bg-black border border-white/10 focus:border-yellow-500 text-white placeholder-gray-600 rounded-xl pl-10 pr-4 py-3 text-sm outline-none transition-all duration-200" />
        </div>
      </div>

      <!-- Confirmar Contraseña -->
      <div class="flex flex-col gap-2">
        <label class="text-white text-sm font-semibold">Confirmar contraseña</label>
        <div class="relative">
          <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-500">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
            </svg>
          </span>
          <input type="password" placeholder="Repite tu contraseña"
            class="w-full bg-black border border-white/10 focus:border-yellow-500 text-white placeholder-gray-600 rounded-xl pl-10 pr-4 py-3 text-sm outline-none transition-all duration-200" />
        </div>
      </div>

      <!-- Términos -->
      <label class="flex items-start gap-3 cursor-pointer group">
        <div class="relative mt-0.5 shrink-0">
          <input type="checkbox" class="hidden peer" />
          <div
            class="w-5 h-5 rounded-md border border-white/20 peer-checked:bg-yellow-500 peer-checked:border-yellow-500 transition-all duration-200 flex items-center justify-center">
            <svg class="w-3 h-3 text-black" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" />
            </svg>
          </div>
        </div>
        <span class="text-gray-400 text-sm leading-relaxed group-hover:text-white transition-colors">
          Acepto los
          <a href="#" class="text-yellow-500 hover:text-yellow-400 transition-colors">términos y condiciones</a>
          y la
          <a href="#" class="text-yellow-500 hover:text-yellow-400 transition-colors">política de privacidad</a>
        </span>
      </label>

      <!-- Botón -->
      <button
        class="w-full bg-yellow-500 hover:bg-yellow-400 text-black font-bold py-3.5 rounded-full transition-all duration-300 hover:scale-[1.02] text-sm tracking-wide uppercase mt-1">
        Crear cuenta
      </button>

      <!-- Divider -->
      <div class="flex items-center gap-3">
        <div class="flex-1 h-px bg-white/10"></div>
        <span class="text-gray-600 text-xs">o regístrate con</span>
        <div class="flex-1 h-px bg-white/10"></div>
      </div>

      <!-- Google -->
      <button
        class="w-full border border-white/10 hover:border-yellow-500/50 bg-black text-white font-semibold py-3 rounded-full transition-all duration-200 text-sm flex items-center justify-center gap-3">
        <svg class="w-4 h-4" viewBox="0 0 24 24">
          <path fill="#4285F4"
            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
          <path fill="#34A853"
            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
          <path fill="#FBBC05"
            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
          <path fill="#EA4335"
            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
        </svg>
        Continuar con Google
      </button>

    </div>

    <!-- Login -->
    <p class="text-gray-500 text-sm text-center">
      ¿Ya tienes cuenta?
      <a routerLink="/login" class="text-yellow-500 hover:text-yellow-400 font-semibold transition-colors ml-1">
        Inicia sesión
      </a>
    </p>

  </div>

</section>
