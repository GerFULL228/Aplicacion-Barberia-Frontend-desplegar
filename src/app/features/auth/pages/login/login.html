<!-- Login -->
<section class="min-h-screen bg-black flex items-center justify-center px-4 py-12">

  <div class="w-full max-w-md flex flex-col items-center gap-8">

    <!-- Logo -->
    <div class="flex flex-col items-center gap-3">
      <img
        src="/assets/Logo_FadeX.webp"
        alt="Fadex Barber"
        class="w-60 h-60 object-contain"
      />
      <h1 class="text-white text-2xl font-bold tracking-widest uppercase">
        Fadex <span class="text-yellow-500">Barber</span>
      </h1>
      <p class="text-gray-500 text-sm">Inicia sesión para continuar</p>
    </div>

    <!-- Card -->
    <div class="w-full bg-[#0c0c0c] border border-white/10 rounded-2xl p-6 sm:p-8 flex flex-col gap-5">
      <form (ngSubmit)="login()">
      <div class="flex flex-col gap-2">
        <label class="text-white text-sm font-semibold">Correo electrónico</label>
        <div class="relative">
          <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-500">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
            </svg>
          </span>
          <input
          [(ngModel)]="loginRequest.username"
        name="username"
        required
            type="email"
            placeholder="tucorreo@email.com"
            class="w-full bg-black border border-white/10 focus:border-yellow-500 text-white placeholder-gray-600 rounded-xl pl-10 pr-4 py-3 text-sm outline-none transition-all duration-200"
          />
        </div>
      </div>

      <!-- Contraseña -->
      <div class="flex flex-col gap-2">
        <div class="flex items-center justify-between">
          <label class="text-white text-sm font-semibold">Contraseña</label>
          <a href="#" class="text-yellow-500 text-xs hover:text-yellow-400 transition-colors">
            ¿Olvidaste tu contraseña?
          </a>
        </div>
        <div class="relative">
          <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-500">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
            </svg>
          </span>
          <input
            type="password"
              [(ngModel)]="loginRequest.password"
        name="password"
        required
            placeholder="••••••••"
            class="w-full bg-black border border-white/10 focus:border-yellow-500 text-white placeholder-gray-600 rounded-xl pl-10 pr-4 py-3 text-sm outline-none transition-all duration-200"
          />
        </div>
      </div>

      <!-- Recordarme -->
      <label class="flex items-center gap-3 cursor-pointer group">
        <div class="relative">
          <input type="checkbox" class="hidden peer" />
          <div class="w-5 h-5 rounded-md border border-white/20 peer-checked:bg-yellow-500 peer-checked:border-yellow-500 transition-all duration-200 flex items-center justify-center">
            <svg class="w-3 h-3 text-black hidden peer-checked:block" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/>
            </svg>
          </div>
        </div>
        <span class="text-gray-400 text-sm group-hover:text-white transition-colors">Recordarme</span>
      </label>

      <!-- Botón -->
      <button [disabled]="loading" class="w-full bg-yellow-500 hover:bg-yellow-400 text-black font-bold py-3.5 rounded-full transition-all duration-300 hover:scale-[1.02] text-sm tracking-wide uppercase mt-1">
        Iniciar Sesión
      </button>

      <!-- Divider -->
      <div class="flex items-center gap-3">
        <div class="flex-1 h-px bg-white/10"></div>
        <span class="text-gray-600 text-xs">o continúa con</span>
        <div class="flex-1 h-px bg-white/10"></div>
      </div>

      <!-- Google -->
      <button class="w-full border border-white/10 hover:border-yellow-500/50 bg-black text-white font-semibold py-3 rounded-full transition-all duration-200 text-sm flex items-center justify-center gap-3">
        <svg class="w-4 h-4" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Continuar con Google
      </button>
      </form>
      <!-- Email -->

    </div>

    <!-- Registro -->
    <p class="text-gray-500 text-sm text-center">
      ¿No tienes cuenta?
      <a routerLink="/register" class="text-yellow-500 hover:text-yellow-400 font-semibold transition-colors ml-1">
        Regístrate gratis
      </a>
    </p>

    @if (errorMessage) {
    <p style="color:red">
      {{errorMessage}}
    </p>
  }

  </div>

</section>
