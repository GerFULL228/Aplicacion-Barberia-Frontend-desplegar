<section class="min-h-screen bg-black relative overflow-hidden flex items-center justify-center px-4 py-10">
  <div class="relative z-10 w-full max-w-lg rounded-2xl overflow-hidden border border-brand-gold/30 bg-[#0b0b0b] p-8">
    <div class="flex flex-col items-center text-center mb-8">
      <app-logo></app-logo>
      <p class="text-text-muted text-sm mt-2">Restablece tu contraseña</p>
    </div>

    <form [formGroup]="formulario" (ngSubmit)="submit()" class="form-base" *ngIf="token">
      <div class="part-form">
        <label for="nuevaPassword" class="text-sm font-medium text-text-muted">Nueva contraseña</label>
        <input
          pInputText
          id="nuevaPassword"
          type="password"
          formControlName="nuevaPassword"
          placeholder="Ingresa tu nueva contraseña"
          autocomplete="new-password"
          class="inputs-text"
        />
        <p-message *ngIf="campoInvalido('nuevaPassword')" severity="error" variant="simple" size="small">
          <span *ngIf="formulario.get('nuevaPassword')?.hasError('required')">La contraseña es obligatoria.</span>
          <span *ngIf="formulario.get('nuevaPassword')?.hasError('minlength')">Mínimo 8 caracteres.</span>
        </p-message>
      </div>

      <div class="part-form">
        <label for="confirmarPassword" class="text-sm font-medium text-text-muted">Confirmar contraseña</label>
        <input
          pInputText
          id="confirmarPassword"
          type="password"
          formControlName="confirmarPassword"
          placeholder="Confirma tu contraseña"
          autocomplete="new-password"
          class="inputs-text"
        />
        <p-message *ngIf="campoInvalido('confirmarPassword') || getPasswordMismatchError()" severity="error" variant="simple" size="small">
          <span *ngIf="formulario.get('confirmarPassword')?.hasError('required')">La confirmación es obligatoria.</span>
          <span *ngIf="getPasswordMismatchError()">Las contraseñas no coinciden.</span>
        </p-message>
      </div>

      <button pButton type="submit" label="Restablecer contraseña" class="boton-primary w-full" [loading]="loading" [disabled]="loading"></button>

      <div *ngIf="successMessage" class="rounded-xl border border-brand-gold/30 bg-[#121212] p-4 text-sm text-brand-gold">
        {{ successMessage }}
      </div>
      <div *ngIf="errorMessage" class="rounded-xl border border-red-500/20 bg-[#121212] p-4 text-sm text-red-400">
        {{ errorMessage }}
      </div>

      <p class="text-text-muted text-sm text-center mt-4">
        <a routerLink="/login" class="text-brand-gold hover:underline">Volver al login</a>
      </p>
    </form>
  </div>
</section>
