<section class="min-h-screen bg-black relative overflow-hidden flex items-center justify-center px-4 py-10">
  <div class="relative z-10 w-full max-w-lg rounded-2xl overflow-hidden border border-brand-gold/30 bg-[#0b0b0b] p-8">
    <div class="flex flex-col items-center text-center mb-8">
      <app-logo></app-logo>
      <p class="text-text-muted text-sm mt-2">Restablece tu contraseña</p>
    </div>

    <!-- TOKEN INVÁLIDO: solo mensaje, sin formulario -->
    <div *ngIf="tokenInvalido" class="flex flex-col items-center gap-4 text-center py-4">
      <i class="pi pi-times-circle text-red-400 text-5xl"></i>
      <p class="text-red-400 text-sm">{{ errorMessage }}</p>
      <a routerLink="/forgot-password" class="text-brand-gold hover:underline text-sm">
        Solicitar un nuevo enlace
      </a>
    </div>

    <!-- FORMULARIO: solo si el token es válido -->
    <form *ngIf="!tokenInvalido && token" [formGroup]="formulario" (ngSubmit)="submit()" class="form-base">
      
      <div class="part-form">
        <label for="nuevaPassword" class="text-sm font-medium text-text-muted">Nueva contraseña</label>
        <div class="relative">
          <input pInputText id="nuevaPassword" [type]="mostrarNueva ? 'text' : 'password'"
            formControlName="nuevaPassword" placeholder="Ingresa tu nueva contraseña"
            autocomplete="new-password" class="inputs-text w-full pr-10" />
          <button type="button" (click)="mostrarNueva = !mostrarNueva"
            class="absolute right-3 top-1/2 -translate-y-1/2 text-text-muted hover:text-brand-gold transition-colors">
            <i [class]="mostrarNueva ? 'pi pi-eye-slash' : 'pi pi-eye'"></i>
          </button>
        </div>
        <p-message *ngIf="campoInvalido('nuevaPassword')" severity="error" variant="simple" size="small">
          <span *ngIf="formulario.get('nuevaPassword')?.hasError('required')">La contraseña es obligatoria.</span>
          <span *ngIf="formulario.get('nuevaPassword')?.hasError('minlength')">Mínimo 8 caracteres.</span>
        </p-message>
      </div>

      <div class="part-form">
        <label for="confirmarPassword" class="text-sm font-medium text-text-muted">Confirmar contraseña</label>
        <div class="relative">
          <input pInputText id="confirmarPassword" [type]="mostrarConfirmar ? 'text' : 'password'"
            formControlName="confirmarPassword" placeholder="Confirma tu contraseña"
            autocomplete="new-password" class="inputs-text w-full pr-10" />
          <button type="button" (click)="mostrarConfirmar = !mostrarConfirmar"
            class="absolute right-3 top-1/2 -translate-y-1/2 text-text-muted hover:text-brand-gold transition-colors">
            <i [class]="mostrarConfirmar ? 'pi pi-eye-slash' : 'pi pi-eye'"></i>
          </button>
        </div>
        <p-message *ngIf="campoInvalido('confirmarPassword') || getPasswordMismatchError()" severity="error" variant="simple" size="small">
          <span *ngIf="formulario.get('confirmarPassword')?.hasError('required')">La confirmación es obligatoria.</span>
          <span *ngIf="getPasswordMismatchError()">Las contraseñas no coinciden.</span>
        </p-message>
      </div>

      <button pButton type="submit" label="Restablecer contraseña" class="boton-primary w-full"
        [loading]="loading" [disabled]="loading"></button>

      <div *ngIf="successMessage" class="rounded-xl border border-brand-gold/30 bg-[#121212] p-4 text-sm text-brand-gold">
        {{ successMessage }}
      </div>
      <div *ngIf="errorMessage" class="rounded-xl border border-red-500/20 bg-[#121212] p-4 text-sm text-red-400">
        {{ errorMessage }}
      </div>

      <p class="text-text-muted text-sm text-center mt-4">
        <a routerLink="/login" class="text-brand-gold hover:underline">Volver al login</a>
      </p>
    </form>

  </div>
</section>
